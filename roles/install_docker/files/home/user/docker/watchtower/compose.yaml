# vim:ft=yaml.docker-compose
services:
  watchtower:
    container_name: watchtower
    image: beatkind/watchtower:latest
    read_only: true
    restart: unless-stopped
    networks:
      - default
    volumes:
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
      - type: bind
        source: /etc/localtime
        target: /etc/localtime
        read_only: true
    tmpfs:
      - "/tmp:rw,noexec,nosuid,nodev,noatime,size=1024m"
    security_opt:
      - no-new-privileges:true
    command: --schedule "0 0 3 * * *"
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "3"
networks:
  default: {}
