# vim:ft=sysctl
# Configure zram
# https://wiki.archlinux.org/title/Zram#Optimizing_swap_on_zram
vm.swappiness = 180
vm.watermark_boost_factor = 0
vm.watermark_scale_factor = 125
vm.page-cluster = 0

# Disable core dumps since they contain the recorded memory of a program at a specific time, usually when that program has crashed, these can contain sensitive information, such as passwords and encryption keys
kernel.core_pattern = |/bin/false
fs.suid_dumpable = 0

# Protects against common exploits in regards to links, fifos and regular files created or controlled by attackers
fs.protected_fifos = 2
fs.protected_regular = 2

# Disable unprivileged calls to bpf() 
kernel.unprivileged_bpf_disabled = 1

# Enable JIT hardening for unprivileged users only
net.core.bpf_jit_harden = 1

# Disable boot into another kernel without going through the usual bootloader process
kernel.kexec_load_disabled = 1

# Disable loading of kernel modules (be careful, your system probably won't boot: https://linux-audit.com/kernel/increase-kernel-integrity-with-disabled-linux-kernel-modules-loading)
# kernel.modules_disabled = 1

# Restrict access to kernel memory addresses via /proc and other interfaces (https://access.redhat.com/articles/7133962)
kernel.kptr_restrict = 2

# Disable magical key combo
kernel.sysrq = 0

# Restrict ptrace usage only to root
kernel.yama.ptrace_scope = 2

# Don't load TTY line disciplines to the CAP_SYS_MODULE capability
dev.tty.ldisc_autoload = 0

# Set logging level of the kernel messages to error
kernel.printk=3 3 3 3

# Enable packet forwarding
net.ipv4.conf.*.forwarding = 1
net.ipv6.conf.*.forwarding = 1

# Enable BBR and Cake queue discipline since it can help achieveing higher bandwidths and lower latencies for internet traffic
net.ipv4.tcp_congestion_control = bbr
net.core.default_qdisc = cake

# Other network optimizations
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216
net.core.netdev_max_backlog = 5000
net.ipv4.tcp_no_metrics_save = 1

# Enable PMTUD (https://serverfault.com/a/778330)
net.ipv4.tcp_mtu_probing = 1

# Enable shrinking the TCP window based on network conditions (https://blog.cloudflare.com/unbounded-memory-usage-by-tcp-for-receive-buffers-and-how-we-fixed-it/)
net.ipv4.tcp_shrink_window = 1

# Enable TFO
net.ipv4.tcp_fastopen = 3

# Disable slow start after an idle period
net.ipv4.tcp_slow_start_after_idle = 0

# Disable tcp timestamps
# net.ipv4.tcp_timestamps = 0

# The length of time an orphaned connection will remain in the FIN_WAIT_2 state before it is aborted
net.ipv4.tcp_fin_timeout = 30

# This enables a fix for time-wait assassination hazards in tcp, described in RFC 1337; this causes the kernel to drop RST packets for sockets in the time-wait state
net.ipv4.tcp_rfc1337 = 1

# Enable IPv6 privacy extensions (RFC3041)
net.ipv6.conf.*.use_tempaddr=2

# Disable IPv4-mapped IPv6
net.ipv6.bindv6only = 1

# Enable reverse path filtering (also enable IPv6 RPF in firewalld.conf with IPv6_rpfilter=strict-forward)
net.ipv4.conf.*.rp_filter = 1

# Only respond to ARP requests if the request is from a source IP address that is reachable via the same network interface
net.ipv4.conf.*.arp_filter = 1

# Reply only if the target IP address is local address configured on the incoming interface
net.ipv4.conf.*.arp_ignore = 1

# Ignore the source address in the IP packet and try to select local address that we prefer for talks with	the target host
net.ipv4.conf.*.arp_announce = 2

# Disable sending of redirects packets
net.ipv4.conf.*.send_redirects = 0

# Disable acceptance of all redirected packets these prevents Man-in-the-Middle attacks
net.ipv4.conf.*.accept_redirects = 0

# Disable acceptance of all secure redirected packets these prevents Man-in-the-Middle attacks
net.ipv4.conf.*.secure_redirects = 0

# Disable acceptance of all redirected packets these prevents Man-in-the-Middle attacks
net.ipv6.conf.*.accept_redirects = 0

# Disable neighbor solicitations to send out per address
net.ipv6.conf.*.dad_transmits = 0

# Disable acceptance of IPv6 router solicitations messages
net.ipv6.conf.*.router_solicitations = 0

# Disable Accept Router Preference from router advertisement
net.ipv6.conf.*.accept_ra_rtr_pref = 0

# Disable learning Prefix Information from router advertisement
net.ipv6.conf.*.accept_ra_pinfo = 0

# Disable learning Hop limit from router advertisement
net.ipv6.conf.*.accept_ra_defrtr = 0

# Disable the system`s acceptance of router advertisement
net.ipv6.conf.*.accept_ra = 0

# Disable IPv6 autoconfiguration
net.ipv6.conf.*.autoconf = 0

# Log packets with impossible addresses to kernel log
# net.ipv4.conf.*.log_martians = 1
